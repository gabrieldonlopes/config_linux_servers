services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - USER=admin
      - PASS=admin
    volumes:
      - /vault/torrents/config:/config
      - /vault/movies:/downloads
      - /vault/torrents/incomplete:/incomplete
      - /vault/torrents/watch:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
